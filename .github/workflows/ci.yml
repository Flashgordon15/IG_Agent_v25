name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
          IG_AGENT_PYTEST: "1"
        run: python -m pytest tests/ -x -q --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        # F401/F841/F811/E741 have pre-existing occurrences in the codebase;
        # tracked separately for a dedicated cleanup PR.
        run: ruff check src/ --select E,F,W --ignore E501,W291,W293,F401,F841,F811,E741
